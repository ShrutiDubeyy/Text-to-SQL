<!DOCTYPE html>
<html>
<head>
  <title>Login — Data Analyst Bot</title>
  <style>
    body { font-family: sans-serif; background: #0f172a; color: #e2e8f0;
           display: flex; justify-content: center; align-items: center; height: 100vh; }
    .box { background: #1e293b; padding: 40px; border-radius: 12px; width: 360px; }
    h2 { margin-bottom: 24px; color: #60a5fa; }
    input { width: 100%; padding: 10px; margin-bottom: 16px; border-radius: 6px;
            border: 1px solid #334155; background: #0f172a; color: white; font-size: 14px; }
    button { width: 100%; padding: 12px; background: #3b82f6; color: white;
             border: none; border-radius: 6px; cursor: pointer; font-size: 15px; }
    button:hover { background: #2563eb; }
    .msg { color: #f87171; margin-bottom: 12px; font-size: 13px; }
    a { color: #60a5fa; font-size: 13px; display: block; margin-top: 16px; text-align: center; }
  </style>
</head>
<body>
  <div class="box">
    <h2>Data Analyst Bot</h2>
    {% for msg in get_flashed_messages() %}
      <div class="msg">{{ msg }}</div>
    {% endfor %}
    <form method="POST">
      <input type="text" name="username" placeholder="Username" required/>
      <input type="password" name="password" placeholder="Password" required/>
      <button type="submit">Login</button>
    </form>
    <a href="/register">Don't have an account? Register</a>
  </div>
</body>
</html>
